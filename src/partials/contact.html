<section class="section contact-section" id="contact">
  <div class="contact-section-wrapper">
    <div class="section-title-wrapper contact-title-wrapper">
      <div class="container section-title-container">
        <picture>
          <source
            srcset="./img/about/left-line-desk.png"
            media="(min-width: 1440px)"
            width="572"
            height="6" />
          <source
            srcset="./img/about/left-line-mob.png"
            width="144"
            height="6" />
          <img
            class="line-img"
            src="./img/about/left-line-mob.png"
            alt="Line"
            width="144"
            height="6"
        /></picture>
        <h2 class="section-title about-title">Contact</h2>
        <picture>
          <source
            srcset="./img/about/right-line-desk.png"
            media="(min-width: 1440px)"
            width="572"
            height="6" />
          <source
            srcset="./img/about/right-line-mob.png"
            width="144"
            height="6" />
          <img
            class="line-img"
            src="./img/about/right-line-mob.png"
            alt="Line"
            width="144"
            height="6"
        /></picture>
      </div>
    </div>
    <div class="contact-bg-wrapper">
      <div class="container contact-container">
        <div class="contact-content-wrapper">
          <p class="section-subtitle contact-subtitle">Let’s keep it sunny</p>
          <a href="mailto:info@northlane.space" class="contact-email-link">
            <svg class="email-icon" width="32" height="32">
              <use href="./img/sprite.svg#icon-email"></use></svg
            ><span>info@northlane.space</span></a
          >
        </div>
        <picture>
          <source
            srcset="./img/contact/contact-bg-desk.jpg"
            media="(min-width: 1440px)"
            width="1440"
            height="740" />
          <source
            srcset="./img/contact/contact-bg-mob.jpg"
            width="375"
            height="300" />
          <img
            class="contact-img"
            src="./img/contact/contact-bg-mob.jpg"
            alt="Screenshot of the game"
            width="375"
            height="300"
            loading="lazy"
        /></picture>
      </div>
    </div>
  </div>
</section>
